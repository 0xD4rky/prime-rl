# Small-scale smoke test — verifies the full pipeline on 20 problems.
# Run:
#   HF_TOKEN=<token> uv run rl @ examples/phy_rl/test.toml \
#     --wandb.project phy-rl --wandb.name phy-rl-test-01

max_steps = 5
seq_len = 4096

[deployment]
num_train_gpus = 2
num_infer_gpus = 2

[model]
name = "Qwen/Qwen3-4B"

[orchestrator]
batch_size = 32
rollouts_per_example = 4

[orchestrator.sampling]
max_tokens = 2048
temperature = 0.7

[[orchestrator.env]]
id = "phy-env"
name = "phy-rl-test"
# olympiadbench: single-part, clean numeric answers, no images — ideal for testing
args = { num_train = 20, num_eval = 5, sources = "olympiadbench_physics" }

[trainer.model]
impl = "auto"

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6

[inference.model]
max_model_len = 4096

[inference.parallel]
dp = 2
